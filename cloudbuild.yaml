# =============================================================================
# cloudbuild.yaml — EcoTracker CI/CD Pipeline
# Google Cloud Build → Artifact Registry → Cloud Run
#
# SETUP (one-time, run these commands before first deploy):
# =============================================================================
#
# 1. Enable required APIs:
#      gcloud services enable \
#        cloudbuild.googleapis.com run.googleapis.com \
#        artifactregistry.googleapis.com secretmanager.googleapis.com \
#        aiplatform.googleapis.com \
#        --project=ecotracker-499709
#
# 2. Create Artifact Registry Docker repo:
#      gcloud artifacts repositories create ecotracker \
#        --repository-format=docker \
#        --location=us-central1 \
#        --project=ecotracker-499709
#
# 3. Store only the Firebase API key in Secret Manager
#    (GEMINI_API_KEY is NOT needed — Vertex AI uses service account credentials):
#      echo -n "AIzaSyBRF3GyYwzDm32ZXXwoizujx2cX85ARB1k" | \
#        gcloud secrets create FIREBASE_API_KEY --data-file=- \
#        --project=ecotracker-499709
#
# 4. Grant Cloud Build SA access to secrets + Cloud Run + Vertex AI:
#      PROJECT_NUMBER=$(gcloud projects describe ecotracker-499709 --format='value(projectNumber)')
#      CB_SA="${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com"
#
#      gcloud projects add-iam-policy-binding ecotracker-499709 \
#        --member="serviceAccount:${CB_SA}" --role="roles/secretmanager.secretAccessor"
#      gcloud projects add-iam-policy-binding ecotracker-499709 \
#        --member="serviceAccount:${CB_SA}" --role="roles/run.admin"
#      gcloud projects add-iam-policy-binding ecotracker-499709 \
#        --member="serviceAccount:${CB_SA}" --role="roles/iam.serviceAccountUser"
#
# 5. Grant the Cloud Run SERVICE ACCOUNT Vertex AI User role so the deployed
#    app can call Vertex AI without an API key:
#      CR_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
#      gcloud projects add-iam-policy-binding ecotracker-499709 \
#        --member="serviceAccount:${CR_SA}" --role="roles/aiplatform.user"
#
# 6. Connect repo: Cloud Build → Triggers → Connect Repository → point to this file
# =============================================================================

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: ecotracker
  _IMAGE: us-central1-docker.pkg.dev/ecotracker-499709/ecotracker/ecotracker

  # Firebase public config (safe to inline — client-side values)
  _VITE_FIREBASE_AUTH_DOMAIN: ecotracker-499709.firebaseapp.com
  _VITE_FIREBASE_PROJECT_ID: ecotracker-499709
  _VITE_FIREBASE_STORAGE_BUCKET: ecotracker-499709.firebasestorage.app
  _VITE_FIREBASE_MESSAGING_SENDER_ID: "853463380014"
  _VITE_FIREBASE_APP_ID: 1:853463380014:web:b9dde8cd779b9d7f66efbf
  _VITE_FIREBASE_MEASUREMENT_ID: G-8P6KGHLH6E
  _VITE_FIRESTORE_DATABASE_ID: ecotracker

  # Vertex AI config (no API key needed — uses service account ADC)
  _VERTEX_PROJECT: ecotracker-499709
  _VERTEX_LOCATION: us-central1

availableSecrets:
  secretManager:
    # Only the Firebase Web API key is secret — Vertex AI uses ADC automatically
    - versionName: projects/ecotracker-499709/secrets/FIREBASE_API_KEY/versions/latest
      env: _SECRET_FIREBASE_API_KEY

steps:
  # ------------------------------------------------------------------
  # Step 1: Build Docker image
  # VITE_* args are baked into the frontend bundle by vite.config.ts.
  # Firebase API key comes from Secret Manager.
  # ------------------------------------------------------------------
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv:
      - _SECRET_FIREBASE_API_KEY
    args:
      - -c
      - |
        docker build \
          --build-arg=VITE_FIREBASE_API_KEY="$$_SECRET_FIREBASE_API_KEY" \
          --build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN} \
          --build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID} \
          --build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET} \
          --build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID} \
          --build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID} \
          --build-arg=VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID} \
          --build-arg=VITE_FIRESTORE_DATABASE_ID=${_VITE_FIRESTORE_DATABASE_ID} \
          --cache-from=${_IMAGE}:latest \
          --tag=${_IMAGE}:$BUILD_ID \
          --tag=${_IMAGE}:latest \
          .

  # ------------------------------------------------------------------
  # Step 2: Push to Artifact Registry
  # ------------------------------------------------------------------
  - id: docker-push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, '${_IMAGE}:$BUILD_ID']
    waitFor: [docker-build]

  - id: docker-push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, '${_IMAGE}:latest']
    waitFor: [docker-build]

  # ------------------------------------------------------------------
  # Step 3: Deploy to Cloud Run
  # GEMINI_API_KEY is intentionally absent — Vertex AI uses ADC via
  # the Cloud Run default service account (Compute Engine SA).
  # That SA must have roles/aiplatform.user (see setup step 5 above).
  # ------------------------------------------------------------------
  - id: cloud-run-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    secretEnv:
      - _SECRET_FIREBASE_API_KEY
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --image=${_IMAGE}:$BUILD_ID \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --set-env-vars=NODE_ENV=production \
          --set-env-vars=FIREBASE_API_KEY=$$_SECRET_FIREBASE_API_KEY \
          --set-env-vars=FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN} \
          --set-env-vars=FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID} \
          --set-env-vars=FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET} \
          --set-env-vars=FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID} \
          --set-env-vars=FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID} \
          --set-env-vars=FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID} \
          --set-env-vars=FIRESTORE_DATABASE_ID=${_VITE_FIRESTORE_DATABASE_ID} \
          --set-env-vars=VERTEX_PROJECT=${_VERTEX_PROJECT} \
          --set-env-vars=VERTEX_LOCATION=${_VERTEX_LOCATION} \
          --project=ecotracker-499709
    waitFor: [docker-push-sha]

  # ------------------------------------------------------------------
  # Step 4: Smoke-test the deployed service
  # ------------------------------------------------------------------
  - id: smoke-test
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} \
          --platform=managed \
          --project=ecotracker-499709 \
          --format='value(status.url)')
        echo "Service URL: $$SERVICE_URL"
        curl --silent --fail "$$SERVICE_URL/api/health" | grep '"status":"ok"'
        echo "✅ Health check passed"
    waitFor: [cloud-run-deploy]

images:
  - ${_IMAGE}:$BUILD_ID
  - ${_IMAGE}:latest

timeout: 600s

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
